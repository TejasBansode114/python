[tool.black]
line-length = 88
target-version = ["py313"]
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.pytest_cache
  | \.ruff_cache
  | \.tox
  | \.venv
  | __pycache__
  | build
  | dist
  | venv
  | env
)/
'''

[tool.isort]
profile = "black"
line_length = 88
skip_gitignore = true
